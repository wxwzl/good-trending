# Dependabot 配置
# 自动检测和更新依赖项

version: 2

updates:
  # 根目录 package.json
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Shanghai'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'automated'
    reviewers:
      - 'wxwzl'
    groups:
      production-dependencies:
        dependency-type: 'production'
      development-dependencies:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'

  # Web 应用
  - package-ecosystem: 'npm'
    directory: '/apps/web'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Shanghai'
    open-pull-requests-limit: 3
    commit-message:
      prefix: 'chore(web)'
    labels:
      - 'dependencies'
      - 'web'

  # API 应用
  - package-ecosystem: 'npm'
    directory: '/apps/api'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Shanghai'
    open-pull-requests-limit: 3
    commit-message:
      prefix: 'chore(api)'
    labels:
      - 'dependencies'
      - 'api'

  # 测试应用
  - package-ecosystem: 'npm'
    directory: '/apps/tests'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Shanghai'
    open-pull-requests-limit: 3
    commit-message:
      prefix: 'chore(tests)'
    labels:
      - 'dependencies'
      - 'tests'

  # Database 包
  - package-ecosystem: 'npm'
    directory: '/packages/database'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Shanghai'
    open-pull-requests-limit: 3
    commit-message:
      prefix: 'chore(database)'
    labels:
      - 'dependencies'
      - 'database'

  # Shared 包
  - package-ecosystem: 'npm'
    directory: '/packages/shared'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Shanghai'
    open-pull-requests-limit: 3
    commit-message:
      prefix: 'chore(shared)'
    labels:
      - 'dependencies'
      - 'shared'

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Shanghai'
    open-pull-requests-limit: 2
    commit-message:
      prefix: 'ci'
    labels:
      - 'github-actions'
      - 'ci'