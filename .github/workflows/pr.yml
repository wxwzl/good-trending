# Pull Request 验证工作流
# 对所有 PR 进行代码检查和测试

name: PR Validation

on:
  pull_request:
    branches:
      - main
      - develop

# 并发控制：同一 PR 的新推送会取消之前的运行
concurrency:
  group: pr-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.0.0'

jobs:
  # 变更检测
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
      crawler: ${{ steps.filter.outputs.crawler }}
      scheduler: ${{ steps.filter.outputs.scheduler }}
      database: ${{ steps.filter.outputs.database }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/shared/**'
              - 'packages/database/**'
            api:
              - 'apps/api/**'
              - 'packages/shared/**'
              - 'packages/database/**'
            crawler:
              - 'apps/crawler/**'
              - 'packages/shared/**'
              - 'packages/database/**'
            scheduler:
              - 'apps/scheduler/**'
              - 'packages/shared/**'
              - 'packages/database/**'
            database:
              - 'packages/database/**'
            shared:
              - 'packages/shared/**'

  # 代码检查
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Check formatting
        run: pnpm format:check

  # API 单元测试
  test-api:
    name: API Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run API unit tests
        run: pnpm test:api
        env:
          NODE_ENV: test

  # 构建
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test-api]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all applications
        run: pnpm build

  # PR 状态检查总结
  pr-status:
    name: PR Status Check
    runs-on: ubuntu-latest
    needs: [lint, test-api, build]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "::error::Lint check failed"
            exit 1
          fi
          if [[ "${{ needs.test-api.result }}" != "success" ]]; then
            echo "::error::API tests failed"
            exit 1
          fi
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "::error::Build failed"
            exit 1
          fi
          echo "All checks passed!"