# ============================================
# Good-Trending Nginx 配置文件
# 域名: www.godtrending.com
# ============================================

# HTTP 服务 (暂无 HTTPS，直接代理到后端)
server {
    listen 80;
    listen [::]:80;
    server_name www.godtrending.com godtrending.com;

    # 日志配置
    access_log /var/log/nginx/godtrending.access.log;
    error_log /var/log/nginx/godtrending.error.log;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ============================================
    # API 服务代理 (/backend/api/ -> localhost:3015/api/v1)
    # ============================================
    location /backend/api/ {
        proxy_pass http://127.0.0.1:3015/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 缓冲区配置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ============================================
    # Web 前端服务 (Next.js) -> localhost:3010
    # ============================================
    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ============================================
    # 静态文件缓存优化
    # ============================================
    # Next.js 静态文件
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3010;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, immutable";
    }

    # 图片和静态资源
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:3010;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ============================================
    # 压缩配置
    # ============================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # TODO: 申请 SSL 证书后，取消下面的 HTTPS 配置
    # 并将上面的 location / 和 /backend/api/ 改为返回 301 重定向到 HTTPS
}

