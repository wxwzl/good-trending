services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: good-trending-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-good_trending}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-good_trending}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: good-trending-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runner
    container_name: good-trending-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3015}:3015"
    environment:
      - NODE_ENV=production
      - APP_ENV=production
      - API_PORT=3015
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-good_trending}
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3010}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Web Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-runner
    container_name: good-trending-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3010}:3010"
    environment:
      - NODE_ENV=production
      - APP_ENV=production
      - PORT=3010
      - API_URL=http://api:3015/api/v1
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api/v1}
    depends_on:
      api:
        condition: service_started

  # Scheduler
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: scheduler-runner
    container_name: good-trending-scheduler
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - APP_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-good_trending}
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: good-trending-network
